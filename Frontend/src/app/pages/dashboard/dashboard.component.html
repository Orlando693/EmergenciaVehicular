<div class="shell" [class.collapsed]="!sidebarOpen()">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-brand">
        <div class="sb-brand-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
          </svg>
        </div>
        <span class="sb-brand-name">Emergencia<br/>Vehicular</span>
      </div>
      <button class="sb-toggle" (click)="toggleSidebar()" title="Colapsar menú">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

    <nav class="sb-nav">
      <span class="sb-section">Menú principal</span>
      @for (item of visibleNav(); track item.route) {
        <a [routerLink]="item.route"
           [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
           routerLinkActive="active"
           class="sb-link"
           [title]="item.label">
          <span class="sb-icon" [innerHTML]="getIcon(item.icon)"></span>
          <span class="sb-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="sb-footer">
      <div class="sb-user">
        <div class="sb-avatar">{{ auth.nombreCompleto.charAt(0).toUpperCase() }}</div>
        <div class="sb-user-info">
          <span class="sb-user-name">{{ auth.nombreCompleto }}</span>
          <span class="sb-user-rol">{{ auth.rol }}</span>
        </div>
      </div>
      <button class="sb-logout" (click)="logout()" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span class="sb-label">Salir</span>
      </button>
    </div>
  </aside>

  <!-- ── Contenido ─────────────────────────────────────── -->
  <main class="main">
    <router-outlet />
  </main>

</div>
